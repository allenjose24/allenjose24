name: Daily Profile Update

on:
  schedule:
    # Runs at 18:30 UTC, which is 12:00 AM IST
    - cron: '30 18 * * *'
  workflow_dispatch: 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update README Date
        env:
          TZ: 'Asia/Kolkata'
        run: |
          CURRENT_DATE=$(date +'%B %d, %Y')
          
          # Replaces the multi-line block between DATE_START and DATE_END
          sed -i "/<!-- DATE_START -->/,/<!-- DATE_END -->/c\<!-- DATE_START -->\n📅 Last Updated: ${CURRENT_DATE}\n<!-- DATE_END -->" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: automated daily date update"
          
          git push
