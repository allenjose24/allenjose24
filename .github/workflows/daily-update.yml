name: Daily Profile Update

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update README
        run: |
          # Removes the old automated date line if it exists
          sed -i '/AUTOMATED_DATE/d' README.md
          
          # Appends the new date as a hidden HTML comment
          echo "" >> README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          # Only commit if there are actual changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: automated daily graph update"
          
          git push
